services:
  - type: web
    name: autosub-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    region: oregon
    envVars:
      - key: WHISPER_MODEL_SIZE
        value: small
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8
      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_FILE_SIZE_MB
        value: "500"
    disk:
      name: autosub-data
      mountPath: /app
      sizeGB: 10
    healthCheckPath: /health
