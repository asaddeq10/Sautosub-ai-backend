services:
  - type: web
    name: autosub-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard          # Standard ($7/mo) — required for persistent disk + 2 GB RAM
    region: oregon
    envVars:
      - key: WHISPER_MODEL_SIZE
        value: tiny         # tiny model (~150 MB) — safe for both free and standard tier RAM
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8
      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_FILE_SIZE_MB
        value: "500"
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: OUTPUT_DIR
        value: /data/outputs
    disk:
      name: autosub-data
      mountPath: /data      # Persistent disk — keeps uploads/SRTs across deploys
      sizeGB: 10
    healthCheckPath: /health
